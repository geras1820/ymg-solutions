    <line x1="23" y1="57" x2="64" y2="42" stroke="#1e293b" stroke-width="1.1"/>
    <!-- Nodes -->
    <circle cx="36" cy="8"  r="2.8" fill="#1a6fd4"/>
    <circle cx="57" cy="19" r="2.8" fill="#1a6fd4"/>
    <circle cx="64" cy="42" r="2.8" fill="#1a6fd4"/>
    <circle cx="48" cy="58" r="2.8" fill="#1a6fd4"/>
    <circle cx="23" cy="57" r="2.8" fill="#1a6fd4"/>
    <circle cx="8"  cy="42" r="2.8" fill="#1a6fd4"/>
    <circle cx="15" cy="22" r="2.8" fill="#1a6fd4"/>
