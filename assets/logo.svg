  <!-- Vertical divider -->
  <line x1="92" y1="10" x2="92" y2="70" stroke="#e2e8f0" stroke-width="1.2"/>

  <!-- Text block — right of divider -->
  <text x="104" y="30"
        font-family="'Segoe UI', Arial, sans-serif"
