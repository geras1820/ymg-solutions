    <circle cx="66" cy="10" r="4" fill="#1a6fd4" opacity=".85"/>
    <circle cx="75" cy="4"  r="2.8" fill="#1a6fd4" opacity=".6"/>
    <circle cx="82" cy="0"  r="1.8" fill="#1a6fd4" opacity=".4"/>
