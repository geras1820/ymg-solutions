<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 90" fill="none">

  <!-- Globe icon -->
  <g transform="translate(6, 5)">
    <circle cx="38" cy="38" r="30" stroke="#1e293b" stroke-width="1.8" fill="none"/>
    <!-- Mesh lines -->
    <line x1="38" y1="8"  x2="16" y2="24" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="38" y1="8"  x2="60" y2="20" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="60" y1="20" x2="68" y2="44" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="68" y1="44" x2="50" y2="62" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="50" y1="62" x2="24" y2="60" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="24" y1="60" x2="8"  y2="44" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="8"  y1="44" x2="16" y2="24" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="16" y1="24" x2="60" y2="20" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="60" y1="20" x2="50" y2="62" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="50" y1="62" x2="8"  y2="44" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="8"  y1="44" x2="38" y2="8"  stroke="#1e293b" stroke-width="1.1"/>
    <line x1="16" y1="24" x2="68" y2="44" stroke="#1e293b" stroke-width="1.1"/>
    <line x1="24" y1="60" x2="68" y2="44" stroke="#1e293b" stroke-width="1.1"/>
    <!-- Nodes -->
    <circle cx="38" cy="8"  r="3" fill="#1a6fd4"/>
    <circle cx="60" cy="20" r="3" fill="#1a6fd4"/>
    <circle cx="68" cy="44" r="3" fill="#1a6fd4"/>
    <circle cx="50" cy="62" r="3" fill="#1a6fd4"/>
    <circle cx="24" cy="60" r="3" fill="#1a6fd4"/>
    <circle cx="8"  cy="44" r="3" fill="#1a6fd4"/>
    <circle cx="16" cy="24" r="3" fill="#1a6fd4"/>
    <!-- Particles -->
    <circle cx="70" cy="12" r="4.5" fill="#1a6fd4" opacity=".9"/>
    <circle cx="81" cy="5"  r="3"   fill="#1a6fd4" opacity=".6"/>
    <circle cx="89" cy="0"  r="2"   fill="#1a6fd4" opacity=".4"/>
    <circle cx="77" cy="0"  r="1.5" fill="#1a6fd4" opacity=".3"/>
  </g>

  <!-- Text block -->
  <!-- YMG -->
  <text x="118" y="34"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="18" font-weight="900"
        fill="#1e293b" letter-spacing="3"
        text-anchor="middle">YMG</text>

  <!-- SOLUTIONS -->
  <text x="118" y="52"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="14" font-weight="700"
        fill="#1e293b" letter-spacing="2"
        text-anchor="middle">SOLUTIONS</text>

  <!-- Divider -->
  <line x1="82" y1="60" x2="154" y2="60" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="118" y="73"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="6.2" font-weight="600"
        fill="#475569" letter-spacing="2"
        text-anchor="middle">INFRAESTRUCTURA · PROYECTOS</text>

</svg>
